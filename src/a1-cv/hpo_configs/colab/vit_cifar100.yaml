study:
  name: vit-cifar100-colab
  output_dir: ../../../../hpo_outputs
  storage_path: ../../../../hpo_outputs/vit-cifar100-colab.db
  seed: 42
  resume: true
search:
  mode: successive_halving
  sampler: tpe
dataset:
  name: cifar100
  validation_fraction: 0.1
  split_seed: 42
  strategy: gpu_resident
model:
  name: vit
search_space:
  path: ../search_spaces/vit_cifar.csv
objectives:
- name: validation_top1
  direction: maximize
  primary: true
- name: wall_seconds
  direction: minimize
- name: peak_gpu_memory_mb
  direction: minimize
constraints:
- name: peak_gpu_memory_mb
  operator: <=
  value: 14000
runtime:
  device: auto
  precision: auto
  tf32: true
  channels_last: false
  compile: false
  concurrent_trials: 1
  memory_reserve_gb: 1.0
  data_strategy: auto
proxy:
  enabled: true
  trials: 8
  epochs: 3
  maximum_steps: 300
  train_fraction: 0.25
  validation_fraction: 0.5
  promote_top_k: 4
successive_halving:
  enabled: true
  resource_type: epochs
  rung_budgets:
  - 6
  - 15
  reduction_factor: 2
  minimum_trials_per_rung: 1
  continue_checkpoints: true
  promotion_metric: validation_top1
full:
  enabled: true
  trials: 1
  epochs: 100
  data_fraction: 1.0
  validation_fraction: 1.0
  seeds:
  - 42
  exhaustive: false
continuous:
  enabled: false
cost_rates:
  gpu_usd_per_hour: null
  cpu_usd_per_hour: null
  storage_usd_per_gb_month: null

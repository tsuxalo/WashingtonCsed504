study:
  name: resnet18-cifar10-continuous
  output_dir: ../../../../hpo_outputs
  storage_path: ../../../../hpo_outputs/resnet18-cifar10-continuous.db
  seed: 42
  resume: true
search:
  mode: successive_halving
  sampler: tpe
dataset:
  name: cifar10
  validation_fraction: 0.1
  split_seed: 42
  strategy: gpu_resident
model:
  name: resnet18
search_space:
  path: ../search_spaces/resnet18_cifar.csv
objectives:
- name: validation_top1
  direction: maximize
  primary: true
- name: wall_seconds
  direction: minimize
- name: peak_gpu_memory_mb
  direction: minimize
constraints:
- name: peak_gpu_memory_mb
  operator: <=
  value: 14000
runtime:
  device: auto
  precision: auto
  tf32: true
  channels_last: true
  compile: false
  concurrent_trials: 1
  memory_reserve_gb: 1.0
  data_strategy: auto
proxy:
  enabled: true
  trials: 8
  epochs: 2
  maximum_steps: 300
  train_fraction: 0.25
  validation_fraction: 0.5
  promote_top_k: 4
successive_halving:
  enabled: true
  resource_type: epochs
  rung_budgets:
  - 5
  - 12
  reduction_factor: 2
  minimum_trials_per_rung: 1
  continue_checkpoints: true
  promotion_metric: validation_top1
full:
  enabled: true
  trials: 1
  epochs: 30
  data_fraction: 1.0
  validation_fraction: 1.0
  seeds:
  - 42
  exhaustive: false
continuous:
  enabled: true
  strategy: successive_halving
  maximum_wall_time_hours: 4.0
  maximum_trials: 32
  stop_after_no_improvement_trials: 12
  minimum_improvement: 0.0005
  pareto_stagnation_trials: 12
  checkpoint_after_each_trial: true
cost_rates:
  gpu_usd_per_hour: null
  cpu_usd_per_hour: null
  storage_usd_per_gb_month: null

study:
  name: hpo-smoke-vit-csv
  output_dir: ../../../../hpo_outputs
  storage_path: ../../../../hpo_outputs/hpo-smoke-vit-csv.db
  seed: 42
  resume: true
search:
  mode: proxy
  sampler: random
dataset:
  name: synthetic
  train_examples: 96
  validation_examples: 48
  test_examples: 48
  num_classes: 10
model:
  name: vit
  hidden_dim: 48
  layers: 1
  heads: 3
  mlp_dim: 96
  patch_size: 8
search_space:
  path: ../search_spaces/smoke_vit.csv
objectives:
  - {name: validation_top1, direction: maximize, primary: true}
  - {name: wall_seconds, direction: minimize}
runtime:
  device: cpu
  precision: fp32
  channels_last: false
  concurrent_trials: 1
  intraop_threads: 1
  interop_threads: 1
proxy:
  enabled: true
  trials: 2
  epochs: 1
  maximum_steps: 2
  train_fraction: 1.0
  validation_fraction: 1.0
  promote_top_k: 1
successive_halving:
  enabled: false
  resource_type: epochs
  rung_budgets: [2]
  reduction_factor: 2
  minimum_trials_per_rung: 1
  continue_checkpoints: true
full:
  enabled: false
  trials: 1
  epochs: 1
  maximum_steps: 2
  seeds: [42]
continuous:
  enabled: false
cost_rates:
  gpu_usd_per_hour: null
  cpu_usd_per_hour: null

study:
  name: hpo-smoke-resnet18-cifar10
  output_dir: ../../../../hpo_outputs
  storage_path: ../../../../hpo_outputs/hpo-smoke-resnet18-cifar10.db
  seed: 42
  resume: true
search:
  mode: successive_halving
  sampler: random
dataset:
  name: synthetic
  train_examples: 96
  validation_examples: 48
  test_examples: 48
  num_classes: 10
model:
  name: resnet18
search_space:
  batch_size: {type: categorical, choices: [16, 32], default: 16}
  optimizer: {type: fixed, default: sgd}
  learning_rate: {type: categorical, choices: [0.01, 0.05], default: 0.01}
  weight_decay: {type: fixed, default: 0.0005}
  momentum: {type: fixed, default: 0.9}
  nesterov: {type: fixed, default: true}
  scheduler: {type: fixed, default: cosine}
  warmup_epochs: {type: fixed, default: 0}
  label_smoothing: {type: fixed, default: 0.0}
  gradient_clip: {type: fixed, default: 0.0}
  channels_last: {type: fixed, default: false}
objectives:
  - {name: validation_top1, direction: maximize, primary: true}
  - {name: wall_seconds, direction: minimize}
runtime:
  device: cpu
  precision: fp32
  concurrent_trials: 1
proxy:
  trials: 2
  epochs: 1
  maximum_steps: 2
  train_fraction: 1.0
  validation_fraction: 1.0
  promote_top_k: 1
successive_halving:
  resource_type: epochs
  rung_budgets: [2]
  reduction_factor: 2
  minimum_trials_per_rung: 1
  continue_checkpoints: true
full:
  enabled: true
  trials: 1
  epochs: 1
  seeds: [42]
continuous:
  enabled: false
cost_rates:
  gpu_usd_per_hour: null
  cpu_usd_per_hour: null

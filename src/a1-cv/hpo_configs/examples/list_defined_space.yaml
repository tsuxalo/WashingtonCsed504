study:
  name: list-defined-space
  output_dir: ../../../../hpo_outputs
  storage_path: ../../../../hpo_outputs/list-defined-space.db
search: {mode: proxy, sampler: random}
dataset: {name: synthetic, train_examples: 128, validation_examples: 64, test_examples: 64, num_classes: 10}
model: {name: resnet18}
search_space:
  - {name: optimizer, type: categorical, choices: [sgd, adamw], default: sgd}
  - {name: learning_rate, type: float, low: 0.0001, high: 0.1, log: true, default: 0.01}
  - {name: batch_size, type: categorical, choices: [16, 32], default: 16}
  - {name: momentum, type: float, low: 0.8, high: 0.99, step: 0.01, default: 0.9, condition: "optimizer == 'sgd'"}
  - {name: beta1, type: float, low: 0.8, high: 0.99, step: 0.01, default: 0.9, condition: "optimizer == 'adamw'"}
objectives:
  - {name: validation_top1, direction: maximize, primary: true}
runtime: {device: cpu, precision: fp32, concurrent_trials: 1}
proxy: {trials: 2, epochs: 1, maximum_steps: 2, train_fraction: 1.0, validation_fraction: 1.0, promote_top_k: 1}
full: {enabled: false, trials: 1, epochs: 1, seeds: [42]}

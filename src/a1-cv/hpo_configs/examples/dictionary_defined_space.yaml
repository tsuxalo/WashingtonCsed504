study:
  name: dictionary-defined-space
  output_dir: ../../../../hpo_outputs
  storage_path: ../../../../hpo_outputs/dictionary-defined-space.db
search: {mode: full, sampler: random}
dataset: {name: synthetic, train_examples: 128, validation_examples: 64, test_examples: 64, num_classes: 10}
model: {name: resnet18}
search_space:
  optimizer: {type: fixed, default: sgd}
  learning_rate: {type: categorical, choices: [0.01, 0.05], default: 0.01}
  batch_size: {type: categorical, choices: [16, 32], default: 16}
  momentum: {type: fixed, default: 0.9}
  nesterov: {type: fixed, default: true}
objectives:
  - {name: validation_top1, direction: maximize, primary: true}
runtime: {device: cpu, precision: fp32, concurrent_trials: 1}
full: {trials: 2, epochs: 1, maximum_steps: 2, seeds: [42], exhaustive: false}
